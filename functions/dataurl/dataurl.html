---
layout: default
permalink: /function/dataurl/
---

<div>
	<div class="post-header">
		<h1 class="post-title">Generate DataURL</h1>
		<div class="post-meta">
			<div class="post-meta-description">Generate DataURL of the uploaded file.</div>
		</div>
	</div>
	<div class="post-content">
		<table>
			<tbody>
				<tr>
					<td class="center header fit-width">Input:</td>
					<td style="padding: 5px; font-size: 0; background: #fff;">
						<input type="file" id="dataurl-input-file" class="hidden" />
						<label id="dataurl-input-label" for="dataurl-input-file" class="button">Select a file...</label>
						<span id="dataurl-input-type" style="margin-left: 5px; font-size: .9rem;"></span>
					</td>
				</tr>
				<tr>
					<td class="center header fit-width">Output:<br />(Base64)</td>
					<td style="padding: 0; font-size: 0; background: #fff;">
						<textarea id="dataurl-output" style="width: 100%; height: 400px; overflow-y: scroll; resize: none; border: none; box-sizing: border-box; font-size: 1rem; word-break: break-all;" readonly></textarea>
					</td>
				</tr>
				<tr>
					<td class="center header fit-width"></td>
					<td style="padding: 5px; font-size: 0; background: #fff;">
						<button id="dataurl-view-output">View DataURL</button>
						<button id="dataurl-download-output">Download DataURL as File</button>
						<button id="dataurl-reset">Reset</button>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
</div>

<script type="module">
let input = document.querySelector("#dataurl-input-file");
input.addEventListener("change", (e) => {
	if (e.target.files.length) {
		var file = e.target.files[0];
		document.querySelector("#dataurl-input-label").innerHTML = file.name;
		if (file.type) document.querySelector("#dataurl-input-type").innerHTML = "(" + file.type + ")";
	} else {
		document.querySelector("#dataurl-input-label").innerHTML = "Select a file...";
		document.querySelector("#dataurl-input-type").innerHTML = "";
	}
});

let btnView = document.querySelector("#dataurl-view-output");
btnView.addEventListener("click", (e) => {
	var input = document.querySelector("#dataurl-input-file");
	if (!input.files.length) return;
	const toBase64 = file => new Promise((resolve, reject) => {
		const reader = new FileReader();
		reader.readAsDataURL(file);
		reader.onload = () => resolve(reader.result);
		reader.onerror = error => reject(error);
	});
	async function viewData() {
		var input = document.querySelector("#dataurl-input-file");
		var file = input.files[0];
		const result = await toBase64(file).catch(e => Error(e));
		if (result instanceof Error) alert(result.message);
		document.querySelector("#dataurl-output").value = result;
	}
	viewData();
});

let btnDownload = document.querySelector("#dataurl-download-output");
btnDownload.addEventListener("click", (e) => {
	var input = document.querySelector("#dataurl-input-file");
	if (!input.files.length) return;
	const toBase64 = file => new Promise((resolve, reject) => {
		const reader = new FileReader();
		reader.readAsDataURL(file);
		reader.onload = () => resolve(reader.result);
		reader.onerror = error => reject(error);
	});
	async function download() {
		var input = document.querySelector("#dataurl-input-file");
		var file = input.files[0];
		const result = await toBase64(file).catch(e => Error(e));
		if (result instanceof Error) alert(result.message);

		var blob = new Blob([result], { type: "text/plain; charset=utf-8" });
		var blobUrl = URL.createObjectURL(blob);
		var a = document.createElement("a");
		a.href = blobUrl;
		a.download = file.name.replace(/\.[^.]+$/, ".txt");
		a.click();
		URL.revokeObjectURL(blobUrl);
	}
	download();
});

let btnReset = document.querySelector("#dataurl-reset");
btnReset.addEventListener("click", (e) => {
	document.querySelector("#dataurl-input-file").value = "";
	document.querySelector("#dataurl-input-label").innerHTML = "Select a file...";
	document.querySelector("#dataurl-input-type").innerHTML = "";
	document.querySelector("#dataurl-output").value = "";
});
</script>
