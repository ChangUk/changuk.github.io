<div>
	<div class="post-header">
		<h1 class="post-title">File Encryption</h1>
		<div class="post-meta">
			<div class="post-meta-description">Encrypt the content of the given file. The passphrase is used for encryption.</div>
		</div>
	</div>
	<div class="post-content">
		<table>
			<tbody>
				<tr>
					<td class="center header fit-width">Input:</td>
					<td style="padding: 5px; font-size: 0; background: #fff;">
						<input type="file" id="file-encryption-input-file" class="hidden" />
						<label id="file-encryption-input-label" for="file-encryption-input-file" class="button">Select a file...</label>
						<span id="file-encryption-input-type" style="margin-left: 5px; font-size: .9rem;"></span>
					</td>
				</tr>
				<tr>
					<td class="center header fit-width">Encryption Key:</td>
					<td style="padding: 0 3px; background: #fff;">
						<input type="password" id="file-encryption-key" placeholder="Input encryption key..." style="padding: 7px; width: 100%; line-height: 1; border: none; box-sizing: border-box;">
					</td>
				</tr>
				<tr>
					<td class="center header fit-width"></td>
					<td style="padding: 5px; font-size: 0; background: #fff;">
						<button id="file-encryption-download">Download Encrypted File</button>
						<button id="file-encryption-reset">Reset</button>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
</div>

<script type="module">
require([
	"/assets/lib/crypto-js/4.0.0/crypto-js.js"
], (CryptoJS) => {
	let input = document.querySelector("#file-encryption-input-file");
	input.addEventListener("change", (e) => {
		if (e.target.files.length) {
			var file = e.target.files[0];
			document.querySelector("#file-encryption-input-label").innerHTML = file.name;
			if (file.type) document.querySelector("#file-encryption-input-type").innerHTML = "(" + file.type + ")";
		} else {
			document.querySelector("#file-encryption-input-label").innerHTML = "Select a file...";
			ocument.querySelector("#file-encryption-input-type").innerHTML = "";
		}
	});

	let inputKey = document.querySelector("#file-encryption-key");
	inputKey.addEventListener("keypress", (e) => {
		e.stopPropagation();
	});
	let cryptoKey = sessionStorage.getItem("passphrase");
	inputKey.value = cryptoKey ? cryptoKey : "";

	let btnDownload = document.querySelector("#file-encryption-download");
	btnDownload.addEventListener("click", e => {
		var input = document.querySelector("#file-encryption-input-file");
		if (!input.files.length) return;
		const encrypt = file => new Promise((resolve, reject) => {
			const reader = new FileReader();
			reader.onload = () => {
				// var ui8a = new Uint8Array(reader.result);
				var wordArray = CryptoJS.lib.WordArray.create(reader.result);
				var encrypted = CryptoJS.AES.encrypt(wordArray, inputKey.value).toString();
				resolve(encrypted);
			}
			reader.onerror = e => reject(e);
			reader.readAsArrayBuffer(file);
		});
		async function download() {
			var input = document.querySelector("#file-encryption-input-file");
			var file = input.files[0];
			const result = await encrypt(file).catch(e => Error(e));
			if (result instanceof Error) alert(result.message);

			var fname = CryptoJS.SHA256(result).toString();
			var fext = file.name.split(".").length > 1 ? "." + file.name.split(".").pop() : "";

			var blob = new Blob([result], { type: "text/plain; charset=utf-8" });
			var blobUrl = URL.createObjectURL(blob);
			var a = document.createElement("a");
			a.href = blobUrl;
			a.download = fname + fext;
			a.click();
			URL.revokeObjectURL(blobUrl);
		}
		download();
	});

	var btnReset = document.querySelector("#file-encryption-reset");
	btnReset.addEventListener("click", e => {
		document.querySelector("#file-encryption-input-file").value = "";
		document.querySelector("#file-encryption-input-label").innerHTML = "Select a file...";
		document.querySelector("#file-encryption-input-type").innerHTML = "";
		document.querySelector("#file-encryption-key").value = "";
	});
});
</script>
