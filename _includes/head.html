<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

	<title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
	<meta name="description" content="{{ site.description }}">

	<!-- WebFont Load Optimization -->
	<link rel="preload" as="font" href="/assets/font/Chosunilbo_myungjo.woff" type="font/woff2" crossorigin="anonymous">

	<!-- Stylesheet -->
	<link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}" />
	<link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}" />

	<!-- KaTeX -->
	<link rel="stylesheet" href="{{ "/assets/lib/katex/0.12.0/katex.min.css" | relative_url }}" />
	<script src="{{ "/assets/lib/katex/0.12.0/katex.min.js" | relative_url }}"></script>
	<script src="{{ "/assets/lib/katex/0.12.0/contrib/auto-render.min.js" | relative_url }}"></script>

	<!-- Raphael.js -->
	<script src="{{ "/assets/lib/raphael/2.3.0/raphael.min.js" | relative_url }}"></script>

	<!-- Sequence diagram -->
	<link rel="stylesheet" href="{{ "/assets/lib/js-sequence-diagram/2.0.1/sequence-diagram-min.css" | relative_url }}" />
	<script src="{{ "/assets/lib/webfont/1.6.6/webfont.js" | relative_url }}"></script>
	<script src="{{ "/assets/lib/underscore/1.12.0/underscore-min.js" | relative_url }}"></script>
	<script src="{{ "/assets/lib/js-sequence-diagram/2.0.1/sequence-diagram-min.js" | relative_url }}"></script>

	<!-- Flowchart -->
	<script src="{{ "/assets/lib/flowchart/1.15.0/flowchart.min.js" | relative_url }}"></script>
	<script src="{{ "/assets/lib/flowchart/1.15.0/options.js" | relative_url }}"></script>

	<!-- Require.js -->
	<script src="{{ "/assets/lib/require/2.3.6/require.min.js" | relative_url }}"></script>

	<!-- Simple Jekyll Search -->
	<script src="{{ "/assets/lib/simple-jekyll-search/1.7.13/simple-jekyll-search.min.js" | relative_url }}"></script>

	<!-- Common scripts -->
	<script src="{{ "/assets/common.js" | relative_url }}"></script>

	<!-- Data viewer -->
	<script src="{{ "/assets/dataviewer.js" | relative_url }}"></script>

	<!-- Embedded script -->
	<script type="text/javascript">
		window.addEventListener("DOMContentLoaded", function() {
			var template = `<li>
				<div class="post-meta">
					<time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">{date}</time>{category}
				</div>
				<h3><a class="post-link" href="{url}">{title}</a></h3>
			</li>`;
			SimpleJekyllSearch({
				searchInput: document.querySelector("#search-input"),
				resultsContainer: document.querySelector("#search-result"),
				json: "{{ site.baseurl }}/search.json",
				searchResultTemplate: template,
				noResultsText: "No results found.",
				fuzzy: false,
				exclude: ["Welcome"]
			});

			var searchInput = document.querySelector("#search-input");
			searchInput.addEventListener("keydown", function (e) {
				if (e.which === 13) {
					if (this.value.toLowerCase() === "private")
						window.location = "{{ "/" | relative_url }}" + this.value;
				} else if (e.which === 27) this.value = "";
			})
			searchInput.focus();
			document.addEventListener("keypress", function () {
				if (document.activeElement.tagName == "BODY") {
					document.querySelector("#search-input").focus();
				}
			});
			document.addEventListener("keyup", function (e) {
				if (searchInput.value.length) {
					this.querySelector("main").classList.add("hidden");
					this.querySelector("result").classList.remove("hidden");
				} else {
					this.querySelector("main").classList.remove("hidden");
					this.querySelector("result").classList.add("hidden");
				}
			}, false);

			if (searchInput.value.length && sessionStorage.searchdata) {
				document.querySelector("#search-result").innerHTML = sessionStorage.searchdata;
				document.querySelector("main").classList.add("hidden");
				document.querySelector("result").classList.remove("hidden");
				searchInput.setSelectionRange(0, searchInput.value.length);
			}

			if (document.querySelector("#groupby")) {
				// Warning: do not use `element.classList.remove("hidden")` instead of `element.style.display`;
				var categoryValue = "category-" + new URL(document.URL).searchParams.get("category");
				if (document.getElementById(categoryValue))
					document.getElementById(categoryValue).style.display = "block";
				var tagValue = "tag-" + new URL(document.URL).searchParams.get("tag");
				if (document.getElementById(tagValue))
					document.getElementById(tagValue).style.display = "block";
				
				if (!document.getElementById(categoryValue) && !document.getElementById(tagValue))
					window.location.href = "{{ site.baseurl }}/404.html";
			}

			// Auto focus on passphrase
			var inputPassphrase = document.querySelector("#input-passphrase");
			if (inputPassphrase) inputPassphrase.focus();
		});
	</script>
</head>
